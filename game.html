<!DOCTYPE HTML>
<html>
  <head>
    <title>Ayodeji Olaleye</title>
    <meta name="description" content="Ayodeji Olaleye." />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    <link rel="stylesheet" href="assets/css/custom.css" />
    <script defer src="./assets/js/script.js"></script>
    <style>
      html,
      body,
      #wrapper {
        height: 100%;
      }

      #main {
        flex: 1 1 auto;
      }

      #gameShell {
        position: relative;
        width: 100%;
        height: clamp(20rem, 72vh, 48rem);
        min-height: clamp(20rem, 72vh, 48rem);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-soft);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      #gameCanvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #gameOverlay {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 1rem;
      }

      .game-hud {
        pointer-events: none;
        border: 1px solid var(--border);
        border-radius: 0.4rem;
        background: var(--card);
        color: var(--text);
        box-shadow: var(--shadow);
        padding: 0.5rem 0.75rem;
        font: 600 0.9rem/1.2 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body class="is-preload">
    <div id="wrapper">
      <header class="site-header">
        <nav class="nav container" aria-label="Primary">
          <a class="brand">Ayodeji Olaleye</a>
          <button id="theme-toggle" class="icon-btn" aria-label="Dark/Light Mode Toggle" aria-pressed="false">
            <span aria-hidden="true">🌓</span>
          </button>
          <a class="nav-link" href="images/OlaleyeResume.pdf" target="_blank" rel="noopener">Resume</a>
          <a class="nav-link" href="mailto:djolaleye@gmail.com">Email</a>
          <a class="nav-link" href="https://github.com/djolaleye" target="_blank" rel="noopener">GitHub</a>
          <a class="nav-link" href="https://www.linkedin.com/in/deji-olaleye" target="_blank" rel="noopener">LinkedIn</a>
        </nav>
      </header>

      <main id="main" class="container">
        <section id="gameShell" aria-label="Retro portfolio game">
          <canvas id="gameCanvas" aria-label="2D retro game world"></canvas>
          <div id="gameOverlay" aria-live="polite"></div>
        </section>
      </main>

      <footer id="site-footer">
        <div class="container">
          <ul class="copyright">
            <li>&copy;<span id="year"></span></li>
          </ul>
        </div>
      </footer>
    </div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/game.js" defer></script>
  </body>
</html>
